name: qodeloc

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: >-
        wget -q --spider http://127.0.0.1:6333/healthz
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  llama-cpp:
    build:
      context: ./llama-cpp
      args:
        UBUNTU_VERSION: "24.04"
        LLAMA_CPP_REF: master
    image: qodeloc/llama-cpp:server
    ports:
      - "8080:8080"
    volumes:
      - llama_cache:/root/.cache/llama.cpp
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-a"
      - "qodeloc-tinyllama"
      - "--hf-repo"
      - "second-state/TinyLlama-1.1B-Chat-v1.0-GGUF"
      - "--hf-file"
      - "TinyLlama-1.1B-Chat-v1.0-Q4_0.gguf"
    restart: unless-stopped
    healthcheck:
      test: >-
        wget -q --spider http://127.0.0.1:8080/health
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 3m

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      OPENAI_API_KEY: sk-qodeloc-dev
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"
      - "--detailed_debug"
    depends_on:
      llama-cpp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: >-
        python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness').read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  qdrant_storage:
  llama_cache:
