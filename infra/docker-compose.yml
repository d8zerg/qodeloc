name: qodeloc

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QODELOC_QDRANT_HTTP_PORT:-6333}:6333"
      - "${QODELOC_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: >-
        bash -lc 'exec 3<>/dev/tcp/127.0.0.1/${QODELOC_QDRANT_HTTP_PORT:-6333} && printf "GET /readyz HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3 && head -n 1 <&3 | grep -q "200 OK"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    platform: linux/amd64
    ports:
      - "${QODELOC_LLAMA_PORT:-8080}:8080"
    volumes:
      - ../${QODELOC_LLAMA_MODEL_DIR:-models/downloads/llama31-8b}:/models/llama31-8b:ro
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${QODELOC_LLAMA_PORT:-8080}"
      - "-a"
      - "qodeloc-llama31-8b"
      - "--ctx-size"
      - "4096"
      - "--no-repack"
      - "--model"
      - "/models/llama31-8b/${QODELOC_LLAMA_MODEL_FILE:-Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf}"
    restart: unless-stopped
    healthcheck:
      test: >-
        curl -fsS http://127.0.0.1:${QODELOC_LLAMA_PORT:-8080}/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 3m

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "${QODELOC_LITELLM_PORT:-4000}:4000"
    environment:
      OPENAI_API_KEY: ${QODELOC_LITELLM_MASTER_KEY:-sk-qodeloc-dev}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${QODELOC_LITELLM_PORT:-4000}"
      - "--detailed_debug"
    depends_on:
      llama-cpp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: >-
        python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${QODELOC_LITELLM_PORT:-4000}/health/readiness').read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  qdrant_storage:
